# ============================================================
# /etc/nginx/nginx.conf  — main config (merge worker/http blocks)
# /etc/nginx/sites-available/finmaster  — copy the server{} block below
# ============================================================

# ── Worker settings (main context of /etc/nginx/nginx.conf) ──
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    # ── Basic ────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Buffer sizes ─────────────────────────────────────────
    client_body_buffer_size    128k;
    client_header_buffer_size    1k;
    client_max_body_size        10m;
    large_client_header_buffers 4 8k;
    output_buffers              1 32k;
    postpone_output             1460;

    proxy_buffer_size    128k;
    proxy_buffers        4 256k;
    proxy_busy_buffers_size 256k;

    # ── Gzip compression ─────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Rate limiting zones ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;

    include /etc/nginx/sites-enabled/*;
}


# ================================================================
# /etc/nginx/sites-available/finmaster  (symlink to sites-enabled)
# ================================================================

server {
    listen 80;
    server_name finmasteracademy.az www.finmasteracademy.az;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name finmasteracademy.az www.finmasteracademy.az;

    # ── SSL (Let's Encrypt) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/finmasteracademy.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finmasteracademy.az/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:50m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Next.js immutable static bundle — 1-year cache ───────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Public assets (logo, hero images, etc.) — 7-day cache
    location ~* ^/(brand|hero-photo|hero-mobile|programs-33)\.(png|jpg|jpeg|webp|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=604800";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Uploaded images from Laravel storage — 30-day cache ──
    location /storage/ {
        proxy_pass http://127.0.0.1:8000;
        add_header Cache-Control "public, max-age=2592000";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Backend auth endpoints — tight rate limit ─────────────
    location ~* ^/api/(login|register)$ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────
    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_read_timeout 60s;
    }

    # ── Laravel sanctum csrf ──────────────────────────────────
    location /sanctum/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
    }

    # ── Next.js app (SSR pages) ───────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_cache_bypass                 $http_upgrade;
        proxy_read_timeout                 60s;
    }
}

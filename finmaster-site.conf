# ── Bütün naməlum domenlər → finmasteracademy.az ─────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://finmasteracademy.az$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/finmasteracademy.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finmasteracademy.az/privkey.pem;
    return 301 https://finmasteracademy.az$request_uri;
}

server {
    listen 80;
    server_name finmasteracademy.az www.finmasteracademy.az;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name finmasteracademy.az www.finmasteracademy.az;

    ssl_certificate     /etc/letsencrypt/live/finmasteracademy.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finmasteracademy.az/privkey.pem;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:50m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        access_log off;
    }

    location ~* ^/(brand|hero-photo|hero-mobile|programs-33)\.(png|jpg|jpeg|webp|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=604800";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /storage/ {
        proxy_pass http://127.0.0.1:8000;
        add_header Cache-Control "public, max-age=2592000";
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location ~* ^/api/(login|register)$ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_read_timeout 60s;
    }

    location /sanctum/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;
        proxy_cache_bypass                 $http_upgrade;
        proxy_read_timeout                 60s;
    }
}
